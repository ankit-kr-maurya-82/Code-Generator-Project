<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">AI</span>
                <span>Code Generator</span>
            </div>
            <span class="provider-pill">CodeGen</span>
        </header>

        <section class="chat-thread" id="chatThread" aria-live="polite">
            <div class="empty-state" id="emptyState">
                <section class="welcome" aria-labelledby="page-title">
                    <h1 id="page-title"><span>Hello, developer.</span> What should we build?</h1>
                </section>

                <section class="suggestions" aria-label="Example prompts">
                    <button type="button" class="chip" data-prompt="Create a responsive React pricing card with monthly and annual billing states.">Create a React pricing card</button>
                    <button type="button" class="chip" data-prompt="Write a Python script that reads a CSV, cleans missing values, and exports a summary report.">Write a CSV cleanup script</button>
                    <button type="button" class="chip" data-prompt="Design a REST API schema for a task manager with auth, projects, labels, and comments.">Design a task manager API</button>
                    <button type="button" class="chip" data-prompt="Explain this error in simple words and show the fix.">Explain and fix an error</button>
                </section>
            </div>
        </section>

        <form class="composer" id="promptForm">
            <label class="sr-only" for="prompt">Prompt</label>
            <textarea id="prompt" placeholder="Message Code Generator"></textarea>

            <div class="composer-footer">
                <span class="count" id="charCount">0 chars</span>
                <button id="generateBtn" class="primary-button" type="submit" aria-label="Send">
                    <span>Send</span>
                    <span class="button-icon">+</span>
                </button>
            </div>
        </form>
    </main>

    <script src="/static/js/app.js?v=20260702-1"></script>
</body>
</html>
